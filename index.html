<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0b1020" />
  <title>실시간 통역</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <!-- 위쪽: 상대방 영역 (뒤집힘) -->
    <section class="panel panel--top" data-side="partner">
      <div class="panel__inner">
        <div class="lang-pill">
          <span class="flag" id="partnerFlag">🇺🇸</span>
          <select class="lang-select" id="partnerLang" aria-label="상대 언어">
            <option value="en">영어</option>
            <option value="ja">일본어</option>
            <option value="zh">중국어</option>
            <option value="es">스페인어</option>
            <option value="fr">프랑스어</option>
            <option value="de">독일어</option>
            <option value="it">이탈리아어</option>
            <option value="pt">포르투갈어</option>
            <option value="ru">러시아어</option>
            <option value="hi">힌디어</option>
            <option value="id">인도네시아어</option>
            <option value="vi">베트남어</option>
            <option value="ko">한국어</option>
          </select>
        </div>
        <div class="subtitles">
          <p class="subtitle subtitle--src" id="partnerSrc" aria-label="상대 원문" data-placeholder="상대의 원문이 여기에 표시됩니다"></p>
          <p class="subtitle subtitle--dst" id="partnerDst" aria-label="상대 번역" data-placeholder="🎙️ 분홍 버튼을 누르고 말해 보세요"></p>
        </div>
      </div>
    </section>

    <!-- 가운데 컨트롤 바 -->
    <section class="controls">
      <button class="ptt ptt--partner" id="pttPartner" aria-label="상대가 말함">
        <span class="ptt__icon">🎙️</span>
        <span class="ptt__label" id="pttPartnerLabel">EN</span>
      </button>

      <div class="status" id="status">대기</div>

      <button class="ptt ptt--me" id="pttMe" aria-label="내가 말함">
        <span class="ptt__icon">🎙️</span>
        <span class="ptt__label" id="pttMeLabel">한</span>
      </button>
    </section>

    <!-- 아래쪽: 내 영역 -->
    <section class="panel panel--bottom" data-side="me">
      <div class="panel__inner">
        <div class="lang-pill">
          <span class="flag" id="myFlag">🇰🇷</span>
          <select class="lang-select" id="myLang" aria-label="내 언어">
            <option value="ko" selected>한국어</option>
            <option value="en">영어</option>
            <option value="ja">일본어</option>
            <option value="zh">중국어</option>
            <option value="es">스페인어</option>
            <option value="fr">프랑스어</option>
            <option value="de">독일어</option>
            <option value="it">이탈리아어</option>
            <option value="pt">포르투갈어</option>
            <option value="ru">러시아어</option>
            <option value="hi">힌디어</option>
            <option value="id">인도네시아어</option>
            <option value="vi">베트남어</option>
          </select>
        </div>
        <div class="subtitles">
          <p class="subtitle subtitle--src" id="meSrc" aria-label="내 원문" data-placeholder="내 원문이 여기에 표시됩니다"></p>
          <p class="subtitle subtitle--dst" id="meDst" aria-label="내 번역" data-placeholder="🎙️ 파란 버튼을 누르고 말해 보세요"></p>
        </div>
      </div>
    </section>

    <!-- 번역 음성 출력 (UI에는 숨김) -->
    <audio id="audioMeToPartner" autoplay playsinline></audio>
    <audio id="audioPartnerToMe" autoplay playsinline></audio>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
