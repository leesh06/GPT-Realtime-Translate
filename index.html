<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0d18" />
  <title>실시간 통역</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="통역" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">

    <!-- 위쪽: 상대방 (180도 회전) -->
    <section class="panel panel--top" id="panelPartner">
      <div class="panel__inner">
        <header class="panel-head">
          <div>
            <div class="lang-name" id="partnerName">영어</div>
            <div class="lang-code" id="partnerCode">EN</div>
          </div>
          <button class="lang-trigger" type="button">
            <span>변경</span>
            <select class="lang-select" id="partnerLang" aria-label="상대 언어">
              <option value="en">영어</option>
              <option value="ja">일본어</option>
              <option value="zh">중국어</option>
              <option value="es">스페인어</option>
              <option value="fr">프랑스어</option>
              <option value="de">독일어</option>
              <option value="it">이탈리아어</option>
              <option value="pt">포르투갈어</option>
              <option value="ru">러시아어</option>
              <option value="hi">힌디어</option>
              <option value="id">인도네시아어</option>
              <option value="vi">베트남어</option>
              <option value="ko">한국어</option>
            </select>
          </button>
        </header>

        <div class="panel-body">
          <canvas class="viz" id="vizPartner" width="320" height="120" aria-hidden="true"></canvas>
          <div class="panel-hint" id="partnerHint">
            <div class="hint-text">보라색 버튼을 누르고 말하세요</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 가운데 컨트롤 -->
    <section class="controls">
      <div class="status-bar" id="status">대기</div>

      <button class="ptt ptt--partner" id="pttPartner" aria-label="상대가 말함">
        <svg class="ptt__icon ptt__icon--mic" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2a3.5 3.5 0 0 0-3.5 3.5v6a3.5 3.5 0 0 0 7 0v-6A3.5 3.5 0 0 0 12 2Z" fill="currentColor"/>
          <path d="M5.25 11.25a.75.75 0 1 0-1.5 0c0 4.18 3.13 7.63 7.16 8.18V21.25H8.5a.75.75 0 0 0 0 1.5h7a.75.75 0 0 0 0-1.5h-2.41v-1.82a8.252 8.252 0 0 0 7.16-8.18.75.75 0 0 0-1.5 0 6.75 6.75 0 0 1-13.5 0Z" fill="currentColor"/>
        </svg>
        <svg class="ptt__icon ptt__icon--stop" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="6" y="6" width="12" height="12" rx="2.5" fill="currentColor"/>
        </svg>
        <span class="ptt__label" id="pttPartnerLabel">영어</span>
      </button>

      <button class="ptt ptt--me" id="pttMe" aria-label="내가 말함">
        <svg class="ptt__icon ptt__icon--mic" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2a3.5 3.5 0 0 0-3.5 3.5v6a3.5 3.5 0 0 0 7 0v-6A3.5 3.5 0 0 0 12 2Z" fill="currentColor"/>
          <path d="M5.25 11.25a.75.75 0 1 0-1.5 0c0 4.18 3.13 7.63 7.16 8.18V21.25H8.5a.75.75 0 0 0 0 1.5h7a.75.75 0 0 0 0-1.5h-2.41v-1.82a8.252 8.252 0 0 0 7.16-8.18.75.75 0 0 0-1.5 0 6.75 6.75 0 0 1-13.5 0Z" fill="currentColor"/>
        </svg>
        <svg class="ptt__icon ptt__icon--stop" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="6" y="6" width="12" height="12" rx="2.5" fill="currentColor"/>
        </svg>
        <span class="ptt__label" id="pttMeLabel">한국어</span>
      </button>
    </section>

    <!-- 아래쪽: 나 -->
    <section class="panel panel--bottom" id="panelMe">
      <div class="panel__inner">
        <header class="panel-head">
          <div>
            <div class="lang-name" id="myName">한국어</div>
            <div class="lang-code" id="myCode">KO</div>
          </div>
          <button class="lang-trigger" type="button">
            <span>변경</span>
            <select class="lang-select" id="myLang" aria-label="내 언어">
              <option value="ko" selected>한국어</option>
              <option value="en">영어</option>
              <option value="ja">일본어</option>
              <option value="zh">중국어</option>
              <option value="es">스페인어</option>
              <option value="fr">프랑스어</option>
              <option value="de">독일어</option>
              <option value="it">이탈리아어</option>
              <option value="pt">포르투갈어</option>
              <option value="ru">러시아어</option>
              <option value="hi">힌디어</option>
              <option value="id">인도네시아어</option>
              <option value="vi">베트남어</option>
            </select>
          </button>
        </header>

        <div class="panel-body">
          <canvas class="viz" id="vizMe" width="320" height="120" aria-hidden="true"></canvas>
          <div class="panel-hint" id="meHint">
            <div class="hint-text">파란색 버튼을 누르고 말하세요</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 번역 음성 출력 (숨김) -->
    <audio id="audioMeToPartner" autoplay playsinline></audio>
    <audio id="audioPartnerToMe" autoplay playsinline></audio>
  </div>

  <!-- 첫 진입 시 사용 가이드 -->
  <div class="onboard" id="onboard" hidden>
    <div class="onboard__card">
      <div class="onboard__hero">🎧</div>
      <h2 class="onboard__title">이어폰을 끼고 써주세요</h2>
      <p class="onboard__lead">
        통역 음성이 폰 스피커로 나오면 다시 마이크에 들어가
        같은 통역이 반복될 수 있어요.
      </p>

      <div class="onboard__steps">
        <div class="onboard__step">
          <div class="onboard__num">1</div>
          <div>
            <div class="onboard__heading">블루투스 이어폰 연결</div>
            <div class="onboard__desc">유선이어도 마이크 없는 헤드폰이면 OK</div>
          </div>
        </div>
        <div class="onboard__step">
          <div class="onboard__num">2</div>
          <div>
            <div class="onboard__heading">통화 오디오 끄기 · 미디어 오디오만 켜기</div>
            <div class="onboard__desc">
              설정 → 블루투스 → 연결된 이어폰 → 통화 오디오 OFF<br>
              미디어 오디오는 ON 유지
            </div>
          </div>
        </div>
        <div class="onboard__step">
          <div class="onboard__num">3</div>
          <div>
            <div class="onboard__heading">화면을 한 번 탭하고 시작</div>
            <div class="onboard__desc">마이크는 폰, 통역은 이어폰으로</div>
          </div>
        </div>
      </div>

      <button class="onboard__cta" id="onboardClose" type="button">시작하기</button>
      <button class="onboard__skip" id="onboardSkip" type="button">다시 보지 않기</button>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
